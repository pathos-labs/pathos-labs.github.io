<!--
  OG IMAGE — Newsletter
  Open in browser, screenshot at 1200×630, save as og-newsletter.png
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: oklch(10% 0.008 260);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; text-align: center;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 89px, oklch(94% 0 0 / 0.02) 89px, oklch(94% 0 0 / 0.02) 90px),
      repeating-linear-gradient(90deg, transparent, transparent 89px, oklch(94% 0 0 / 0.02) 89px, oklch(94% 0 0 / 0.02) 90px);
  }
  .content {
    position: relative; z-index: 1;
    width: 800px; max-width: 800px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400; font-size: 82px;
    line-height: 1.1; color: oklch(94% 0.005 80);
    margin-bottom: 24px;
    text-align: center; width: 100%;
  }
  .sub {
    font-family: 'Outfit', sans-serif;
    font-weight: 300; font-size: 21px;
    color: oklch(60% 0.005 260);
    line-height: 1.5;
    text-align: center; width: 100%;
    max-width: 600px;
  }
  .wordmark {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase;
    color: oklch(60% 0.005 260);
  }
  .wordmark .dot { color: oklch(60% 0.135 35); }
  .wordmark .labs { font-weight: 400; }
</style>
</head>
<body>
  <div class="content">
    <h1>Presence Under<br>Pressure.</h1>
    <p class="sub">A weekly letter on communication, human performance, and what it actually takes to get unstuck.</p>
  </div>
  <div class="wordmark">PATHOS<span class="dot">.</span><span class="labs">LABS</span></div>
</body>
</html>
