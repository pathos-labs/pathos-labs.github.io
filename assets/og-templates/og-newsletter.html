<!--
  OG IMAGE — Newsletter
  Open in browser, screenshot at 1200×630, save as og-newsletter.png
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="stylesheet" href="local-fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: oklch(10% 0.008 260);
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 89px, oklch(94% 0 0 / 0.02) 89px, oklch(94% 0 0 / 0.02) 90px),
      repeating-linear-gradient(90deg, transparent, transparent 89px, oklch(94% 0 0 / 0.02) 89px, oklch(94% 0 0 / 0.02) 90px);
  }
  .content { position: absolute; z-index: 1; top: 50%; left: 0; transform: translateY(-50%); padding: 80px 90px; }
  .eyebrow {
    font-family: 'Outfit', sans-serif;
    font-weight: 500; font-size: 22px;
    letter-spacing: 4px; text-transform: uppercase;
    color: oklch(60% 0.135 35);
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before { content: ''; width: 28px; height: 2px; background: oklch(60% 0.135 35); }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400; font-size: 120px;
    line-height: 1.0; color: oklch(94% 0.005 80);
  }
  .sub {
    font-family: 'Outfit', sans-serif;
    font-weight: 300; font-size: 36px;
    color: oklch(60% 0.005 260);
    margin-top: 28px; max-width: 700px; line-height: 1.4;
  }
  .wordmark {
    position: absolute; bottom: 60px; right: 80px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 18px;
    letter-spacing: 3px; text-transform: uppercase;
    color: oklch(60% 0.005 260);
  }
  .wordmark .dot { color: oklch(60% 0.135 35); }
  .wordmark .labs { font-weight: 400; }
</style>
</head>
<body>
  <div class="content">
    <div class="eyebrow">Weekly Newsletter</div>
    <h1>Presence Under<br>Pressure.</h1>
    <p class="sub">Communication, performance, and the internal blockers that keep capable people stuck.</p>
  </div>
  <div class="wordmark">PATHOS<span class="dot">.</span><span class="labs">LABS</span></div>
</body>
</html>
