<!--
  LINKEDIN COMPANY PAGE BANNER — 1128×191
  Open in browser, screenshot at 1128×191, save as banner-company.png
  LinkedIn company logo overlaps bottom-left corner — keep left ~220px clear
  Content pushed right, large and legible
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1128px; height: 191px;
    background: oklch(10% 0.008 260);
    display: flex; align-items: center;
    justify-content: flex-end;
    overflow: hidden; position: relative;
    font-family: 'Outfit', sans-serif;
    /* Hard left dead zone — LinkedIn logo overlaps ~200px from left */
    padding-left: 220px;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, oklch(94% 0 0 / 0.015) 59px, oklch(94% 0 0 / 0.015) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, oklch(94% 0 0 / 0.015) 59px, oklch(94% 0 0 / 0.015) 60px);
  }
  .content {
    position: relative; z-index: 1;
    padding: 0 56px 0 0;
    width: 100%;
    display: flex; flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    text-align: right;
  }
  .strapline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 42px;
    line-height: 1.1;
    color: oklch(94% 0.005 80);
    white-space: nowrap;
  }
  .clients-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: oklch(55% 0.005 260);
  }
  .clients {
    display: flex; gap: 16px; align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .client {
    font-size: 12px; font-weight: 500;
    color: oklch(65% 0.005 260);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .client-sep {
    width: 3px; height: 3px;
    background: oklch(48% 0.145 32);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .accent-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: oklch(48% 0.145 32);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="strapline">Presence under pressure.</div>
    <div class="clients-label">Trusted by leaders at</div>
    <div class="clients">
      <span class="client">Morgan Stanley</span>
      <span class="client-sep"></span>
      <span class="client">Church of England</span>
      <span class="client-sep"></span>
      <span class="client">Invesco</span>
      <span class="client-sep"></span>
      <span class="client">YuLife</span>
      <span class="client-sep"></span>
      <span class="client">Relation Therapeutics</span>
      <span class="client-sep"></span>
      <span class="client">KYC360</span>
    </div>
  </div>
  <div class="accent-line"></div>
</body>
</html>
