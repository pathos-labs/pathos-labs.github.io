<!--
  LINKEDIN COMPANY PAGE BANNER — 1128×191
  Screenshot: chromium --headless=new --disable-gpu --no-sandbox --ozone-platform=headless --screenshot=banner-company.png --window-size=1128x191
  LinkedIn company logo overlaps bottom-left corner — keep left ~180px clear
  NOTE: Chrome enforces min viewport height ~493px but screenshot crops to 191px. Use fixed top positioning.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1128">
<link rel="stylesheet" href="local-fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: oklch(10% 0.008 260);
    overflow: hidden; position: relative;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, oklch(94% 0 0 / 0.015) 59px, oklch(94% 0 0 / 0.015) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, oklch(94% 0 0 / 0.015) 59px, oklch(94% 0 0 / 0.015) 60px);
  }
  .content {
    position: absolute; z-index: 1;
    top: 50px;
    left: 160px; right: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .strapline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 38px;
    line-height: 1.1;
    color: oklch(94% 0.005 80);
    white-space: nowrap;
  }
  .strapline em {
    color: oklch(60% 0.135 35);
  }
  .clients {
    display: flex; gap: 10px; align-items: center;
    flex-shrink: 0;
  }
  .client {
    font-size: 12px; font-weight: 500;
    color: oklch(65% 0.005 260);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .client-sep {
    width: 3px; height: 3px;
    background: oklch(48% 0.145 32);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .accent-line {
    position: absolute;
    top: 189px; left: 0; right: 0;
    height: 2px;
    background: oklch(48% 0.145 32);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="strapline">Presence under <em>pressure.</em></div>
    <div class="clients">
      <span class="client">Morgan Stanley</span>
      <span class="client-sep"></span>
      <span class="client">Invesco</span>
    </div>
  </div>
  <div class="accent-line"></div>
</body>
</html>
