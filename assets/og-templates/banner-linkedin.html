<!--
  LINKEDIN PERSONAL BANNER — 1584×396
  Open in browser, screenshot at 1584×396, save as banner-linkedin.png
  Style: Minimal, dark, right-oriented, strapline + client names
  Note: LinkedIn profile photo overlaps bottom-left ~180px, so content stays right
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1584px; height: 396px;
    background: oklch(10% 0.008 260);
    display: flex; align-items: center;
    justify-content: flex-end;
    overflow: hidden; position: relative;
    font-family: 'Outfit', sans-serif;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 99px, oklch(94% 0 0 / 0.015) 99px, oklch(94% 0 0 / 0.015) 100px),
      repeating-linear-gradient(90deg, transparent, transparent 99px, oklch(94% 0 0 / 0.015) 99px, oklch(94% 0 0 / 0.015) 100px);
  }
  .content {
    position: relative; z-index: 1;
    padding: 0 100px;
    display: flex; flex-direction: column;
    align-items: flex-end;
    gap: 20px;
    text-align: right;
  }
  .wordmark {
    font-weight: 700; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase;
    color: oklch(94% 0.005 80);
  }
  .wordmark .dot { color: oklch(60% 0.135 35); }
  .wordmark .labs { font-weight: 400; }
  .strapline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 42px;
    line-height: 1.15;
    color: oklch(94% 0.005 80);
  }
  .clients-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: oklch(40% 0.005 260);
    margin-top: 4px;
  }
  .clients {
    display: flex; gap: 20px; align-items: center;
  }
  .client {
    font-size: 11px; font-weight: 500;
    color: oklch(45% 0.005 260);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .client-sep {
    width: 3px; height: 3px;
    background: oklch(48% 0.145 32);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .accent-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: oklch(48% 0.145 32);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="wordmark">PATHOS<span class="dot">.</span><span class="labs">LABS</span></div>
    <div class="strapline">Presence under pressure.</div>
    <div class="clients-label">Trusted by leaders at</div>
    <div class="clients">
      <span class="client">Morgan Stanley</span>
      <span class="client-sep"></span>
      <span class="client">Church of England</span>
      <span class="client-sep"></span>
      <span class="client">Invesco</span>
      <span class="client-sep"></span>
      <span class="client">YuLife</span>
      <span class="client-sep"></span>
      <span class="client">Relation Therapeutics</span>
      <span class="client-sep"></span>
      <span class="client">KYC360</span>
    </div>
  </div>
  <div class="accent-line"></div>
</body>
</html>
