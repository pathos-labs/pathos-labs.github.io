<!--
  LINKEDIN PERSONAL BANNER — 1584×396
  Screenshot via Playwright with viewport: { width: 1584, height: 396 }
  Profile photo covers bottom-left ~25% of banner.
  ALL content placed in right half.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="local-fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1584px; height: 396px;
    background: oklch(10% 0.008 260);
    overflow: hidden; position: relative;
    font-family: 'Outfit', sans-serif;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 99px, oklch(94% 0 0 / 0.015) 99px, oklch(94% 0 0 / 0.015) 100px),
      repeating-linear-gradient(90deg, transparent, transparent 99px, oklch(94% 0 0 / 0.015) 99px, oklch(94% 0 0 / 0.015) 100px);
  }
  .content {
    position: absolute; z-index: 1;
    top: 80px;
    right: 80px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
    gap: 12px;
  }
  .wordmark {
    font-weight: 700; font-size: 16px;
    letter-spacing: 4px; text-transform: uppercase;
    color: oklch(80% 0.005 80);
    margin-bottom: 4px;
  }
  .wordmark .dot { color: oklch(60% 0.135 35); }
  .wordmark .labs { font-weight: 400; }
  .strapline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 64px;
    line-height: 1.1;
    color: oklch(94% 0.005 80);
    white-space: nowrap;
  }
  .strapline em {
    color: oklch(60% 0.135 35);
  }
  .sub {
    font-weight: 300;
    font-size: 20px;
    color: oklch(60% 0.005 260);
    line-height: 1.4;
    white-space: nowrap;
  }
  .divider {
    width: 40px; height: 2px;
    background: oklch(48% 0.145 32);
    margin: 2px 0;
  }
  .client-row {
    display: flex; gap: 14px; align-items: center;
  }
  .client {
    font-size: 12px; font-weight: 500;
    color: oklch(55% 0.005 260);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .client-sep {
    width: 3px; height: 3px;
    background: oklch(48% 0.145 32);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .accent-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: oklch(48% 0.145 32);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="wordmark">PATHOS<span class="dot">.</span><span class="labs">LABS</span></div>
    <div class="strapline">Presence under <em>pressure.</em></div>
    <p class="sub">Executive communication advisory for founders and senior leaders.</p>
    <div class="divider"></div>
    <div class="client-row">
      <span class="client">Morgan Stanley</span>
      <span class="client-sep"></span>
      <span class="client">Church of England</span>
      <span class="client-sep"></span>
      <span class="client">Invesco</span>
      <span class="client-sep"></span>
      <span class="client">YuLife</span>
    </div>
  </div>
  <div class="accent-line"></div>
</body>
</html>
