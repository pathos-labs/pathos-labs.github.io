<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathos Labs</title>
  <style>
    .email-body h1 {
      font-family: 'Instrument Serif', Georgia, serif !important;
      font-size: 28px !important;
      font-weight: 400 !important;
      line-height: 1.25 !important;
      color: #231f1b !important;
      margin: 0 0 20px 0 !important;
      padding: 0 !important;
    }
    .email-body h2 {
      font-family: 'Instrument Serif', Georgia, serif !important;
      font-size: 22px !important;
      font-weight: 400 !important;
      line-height: 1.3 !important;
      color: #231f1b !important;
      margin: 32px 0 12px 0 !important;
      padding: 0 !important;
    }
    .email-body h3 {
      font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      letter-spacing: 1.5px !important;
      text-transform: uppercase !important;
      color: #3d3833 !important;
      margin: 28px 0 8px 0 !important;
      padding: 0 !important;
    }
    .email-body p {
      font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: 16px !important;
      line-height: 1.7 !important;
      color: #3d3833 !important;
      font-weight: 400 !important;
      margin: 0 0 16px 0 !important;
    }
    .email-body a {
      color: #8b4d3b !important;
      text-decoration: underline !important;
    }
    .blockquotes {
      border-left: 3px solid #8b4d3b !important;
      border-right: none !important;
      border-top: none !important;
      border-bottom: none !important;
      margin: 24px 0 !important;
      padding: 12px 24px !important;
      background-color: #f0ede8 !important;
    }
    .blockquotes-line {
      font-family: 'Instrument Serif', Georgia, serif !important;
      font-style: italic !important;
      font-size: 18px !important;
      line-height: 1.6 !important;
      color: #3d3833 !important;
    }
    .email-button {
      border: none !important;
      background-color: #8b4d3b !important;
      color: #f7f5f2 !important;
      padding: 14px 32px !important;
      display: inline-block !important;
      margin: 16px 0 !important;
      font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      letter-spacing: 1.5px !important;
      text-transform: uppercase !important;
      text-decoration: none !important;
      border-radius: 0 !important;
    }
    .email-body ul, .email-body ol {
      font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: 16px !important;
      line-height: 1.7 !important;
      color: #3d3833 !important;
      font-weight: 400 !important;
      margin: 8px 0 16px 0 !important;
      padding-left: 24px !important;
    }
    .email-body li {
      margin-bottom: 8px !important;
    }
    .email-body hr {
      border: none !important;
      border-top: 1px solid #e5e0db !important;
      margin: 32px 0 !important;
    }
    .email-body img {
      max-width: 100% !important;
      height: auto !important;
      margin: 16px 0 !important;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f7f5f2;">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f7f5f2;">
  <tr>
    <td align="center" style="padding: 40px 20px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 600px;">

        <tr>
          <td style="padding: 0 0 32px 0; font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #231f1b;">
            PATHOS<span style="color: #8b4d3b;">.</span><span style="font-weight: 400;">LABS</span>
          </td>
        </tr>

        <tr>
          <td style="border-top: 1px solid #e5e0db; padding: 0;"></td>
        </tr>

        <tr>
          <td class="email-body" style="padding: 40px 0; font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.7; color: #3d3833; font-weight: 400;">
            {{ message_content }}
          </td>
        </tr>

        <tr>
          <td style="border-top: 1px solid #e5e0db; padding: 0;"></td>
        </tr>

        <tr>
          <td style="padding: 32px 0 0 0;">
            <p style="font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin: 0 0 28px 0;">
              <a href="https://pathoslabs.co" style="color: #8b4d3b; text-decoration: none;">pathoslabs.co</a>
              &nbsp;&nbsp;&middot;&nbsp;&nbsp;
              <a href="https://cal.com/pathos-labs/fit-match-30" style="color: #8b4d3b; text-decoration: none;">Start the Conversation</a>
            </p>
            <p style="font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-size: 14px; color: #8a8580; margin: 0 0 20px 0;">
              Executive communication. Rebuilt from the inside.
            </p>
            <p style="font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; line-height: 1.6; color: #7a7470; font-weight: 300; margin: 0;">
              You received this because you subscribed to the Pathos Labs newsletter.<br>
              <a href="{{ unsubscribe_url }}" style="color: #7a7470; text-decoration: underline;">Unsubscribe</a><br><br>
              {{ address }}
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
